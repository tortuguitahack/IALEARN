<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIHACKTOR Ω - Nexus de IA Expertos</title>
    <meta name="description" content="Plataforma premium de herramientas de IA. Accede a frameworks y protocolos sincronizados.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- NO se importa Supabase. CERO credenciales en este archivo. -->
    
    <style>
        :root {
            --nebula-bg: radial-gradient(circle at center, #1a0b2e 0%, #010103 100%);
            --accent: #00f2ff;
            --gold: #ffcf00;
        }
        body {
            background: var(--nebula-bg);
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }
        .product-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(0, 0, 0, 0.4);
        }
        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
            border-color: var(--accent);
        }
        .glitch-text { text-shadow: 2px 2px #ff00c1, -2px -2px #00fff9; }
        .tab-btn.active { border-bottom: 2px solid var(--accent); color: var(--accent); }
        .fresh-badge {
            background: linear-gradient(45deg, #00f2ff, #0066ff);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Header -->
    <header class="sticky top-0 z-50 glass-panel mx-4 mt-4 p-4 flex flex-wrap justify-between items-center gap-4">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-cyan-500 rounded-full flex items-center justify-center animate-pulse shadow-[0_0_15px_#00f2ff]">
                <i class="fas fa-microchip text-2xl text-black"></i>
            </div>
            <div>
                <h1 class="text-xl font-black tracking-tighter glitch-text">DIHACKTOR Ω</h1>
                <p class="text-[10px] text-cyan-400 uppercase tracking-[0.2em]">Sincronización Nivel 7 - LIVE</p>
            </div>
        </div>
        <div class="flex-grow max-w-xl">
            <div class="relative">
                <input type="text" id="searchInput" placeholder="Buscar Protocolos de IA..." 
                       oninput="handleSearch(this.value)"
                       class="w-full bg-black/50 border border-white/10 rounded-full py-2 px-10 focus:outline-none focus:border-cyan-400 text-sm transition-all">
                <i class="fas fa-search absolute left-4 top-3 text-gray-500 text-sm"></i>
            </div>
        </div>
    </header>

    <!-- Categorías -->
    <nav class="flex overflow-x-auto p-4 gap-3 no-scrollbar mx-2 mt-2">
        <button onclick="filterSpecialty(null)" class="whitespace-nowrap px-6 py-2 rounded-full glass-panel text-xs hover:bg-white/10 transition-colors">TODO</button>
        <div id="specialtyContainer" class="flex gap-3"></div>
    </nav>

    <!-- Grid de Productos -->
    <main class="container mx-auto px-4 py-8">
        <div id="inventoryGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div class="col-span-full flex flex-col items-center justify-center py-20">
                <div class="w-10 h-10 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="text-gray-500 text-sm">Sincronizando protocolos con Nodo ASUS...</p>
            </div>
        </div>
    </main>

    <!-- Modal de Producto -->
    <div id="productModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-md" onclick="closeModal('productModal')"></div>
        <div id="modalContent" class="relative glass-panel max-w-4xl w-full max-h-[90vh] overflow-y-auto p-6 md:p-10 flex flex-col md:flex-row gap-8"></div>
    </div>

    <!-- Modal de Checkout (Terminal de Pagos) -->
    <div id="checkoutModal" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-xl"></div>
        <div class="relative glass-panel border border-cyan-500/50 max-w-2xl w-full p-8 shadow-[0_0_50px_rgba(0,242,255,0.1)]">
            <button onclick="closeModal('checkoutModal')" class="absolute top-4 right-4 text-2xl text-gray-500 hover:text-red-500 transition-colors">&times;</button>
            
            <h2 class="text-2xl font-black mb-2 glitch-text uppercase">Terminal de Pago Capa 7</h2>
            <p class="text-xs text-gray-400 mb-6" id="checkoutProductName">Procesando orden...</p>
            
            <div class="flex border-b border-white/10 mb-6">
                <button onclick="switchTab('crypto')" id="tab-crypto" class="tab-btn active flex-1 py-3 text-sm font-bold uppercase transition-all"><i class="fab fa-bitcoin mr-2"></i>Crypto</button>
                <button onclick="switchTab('bank')" id="tab-bank" class="tab-btn flex-1 py-3 text-sm font-bold uppercase transition-all"><i class="fas fa-university mr-2"></i>Banca Fiat</button>
                <button onclick="switchTab('stripe')" id="tab-stripe" class="tab-btn flex-1 py-3 text-sm font-bold uppercase transition-all"><i class="fab fa-stripe mr-2"></i>Stripe</button>
            </div>

            <!-- Contenido Crypto -->
            <div id="content-crypto" class="space-y-4">
                <div id="crypto-wallets-container">
                    <div class="flex items-center justify-center p-10">
                        <div class="w-8 h-8 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
                        <span class="ml-3 text-sm text-gray-400">Sincronizando wallets...</span>
                    </div>
                </div>
            </div>

            <!-- Contenido Banca Fiat -->
            <div id="content-bank" class="space-y-4 hidden">
                <div id="bank-accounts-container">
                    <div class="flex items-center justify-center p-10">
                        <div class="w-8 h-8 border-4 border-yellow-500 border-t-transparent rounded-full animate-spin"></div>
                        <span class="ml-3 text-sm text-gray-400">Cargando cuentas bancarias...</span>
                    </div>
                </div>
            </div>

            <!-- Contenido Stripe -->
            <div id="content-stripe" class="space-y-4 hidden">
                <div id="stripe-container" class="text-center py-8">
                    <p class="text-gray-400 text-sm">Cargando enlace de pago...</p>
                </div>
            </div>

            <div class="mt-6 pt-6 border-t border-white/10">
                <p class="text-xs text-cyan-400 mb-2 uppercase font-bold"><i class="fas fa-shield-alt"></i> Verificación de Red</p>
                <input type="email" id="buyerEmail" placeholder="Email para entrega..." class="w-full bg-black border border-white/10 rounded px-4 py-2 text-sm mb-3 focus:border-cyan-500 outline-none">
                <input type="text" id="txHash" placeholder="Pega aquí el TXID o Hash..." class="w-full bg-black border border-white/10 rounded px-4 py-2 text-sm mb-4 focus:border-cyan-500 outline-none">
                
                <button onclick="verifyPayment()" id="btnVerify" class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-black py-3 rounded uppercase tracking-widest transition-all">
                    Sincronizar Pago en Nodo
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 glass-panel px-6 py-3 border-cyan-500 flex items-center gap-3 z-[200]">
        <i class="fas fa-info-circle text-cyan-400"></i>
        <span id="toastMsg" class="text-sm font-bold">Copiado</span>
    </div>

    <script>
        // =====================================================
        // CONFIGURACIÓN — ÚNICA variable a configurar
        // Cambia esto a la URL pública de tu tunnel/cloudflare
        // =====================================================
        const API_BASE = "https://consistent-winston-charged-tough.trycloudflare.com";
        // Para desarrollo local: "http://10.1.1.92:8000"
        // Para producción (Cloudflare Tunnel): "https://tu-subdominio.trycloudflare.com"
        // Para producción (ngrok): "https://xxxx.ngrok-free.app"

        let inventory = [];
        let selectedProduct = null;
        let paymentData = null;
        let activeSpecialty = null;
        let searchQuery = '';

        // =====================================================
        // 1. CARGAR PRODUCTOS — via API (NO Supabase directo)
        // =====================================================
        async function initInventory() {
            try {
                const response = await fetch(`${API_BASE}/api/products`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();

                inventory = data.products || [];
                renderSpecialties();
                renderGrid();

            } catch (err) {
                console.error("Error cargando inventario:", err);
                showToast("❌ Error de sincronización con el nodo.");
                document.getElementById('inventoryGrid').innerHTML = `
                    <div class="col-span-full text-center py-20">
                        <i class="fas fa-exclamation-triangle text-4xl text-red-500 mb-4 block"></i>
                        <p class="text-gray-400 font-bold">Error de conexión con el Nodo ASUS</p>
                        <p class="text-xs text-gray-600 mt-2">Verifica que la API esté corriendo y el tunnel activo.</p>
                        <p class="text-xs text-gray-700 mt-1">${API_BASE}/api/health</p>
                        <button onclick="initInventory()" class="mt-4 px-6 py-2 bg-cyan-500/20 text-cyan-400 rounded-full text-xs hover:bg-cyan-500/30 transition-colors">
                            <i class="fas fa-redo mr-1"></i> Reintentar
                        </button>
                    </div>`;
            }
        }

        // =====================================================
        // 2. RENDER
        // =====================================================
        function renderSpecialties() {
            const container = document.getElementById('specialtyContainer');
            const specialties = [...new Set(inventory.map(p => p.specialty).filter(Boolean))];
            container.innerHTML = specialties.map(s => `
                <button onclick="filterSpecialty('${s}')" class="whitespace-nowrap px-6 py-2 rounded-full glass-panel text-xs hover:bg-white/10 transition-colors">${s}</button>
            `).join('');
        }

        function filterSpecialty(specialty) {
            activeSpecialty = specialty;
            renderGrid();
        }

        function handleSearch(query) {
            searchQuery = query.toLowerCase().trim();
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('inventoryGrid');
            if (inventory.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center text-gray-500">No hay productos disponibles.</p>`;
                return;
            }

            let filtered = inventory;
            if (activeSpecialty) {
                filtered = filtered.filter(p => p.specialty === activeSpecialty);
            }
            if (searchQuery) {
                filtered = filtered.filter(p => 
                    (p.title && p.title.toLowerCase().includes(searchQuery)) ||
                    (p.specialty && p.specialty.toLowerCase().includes(searchQuery))
                );
            }

            if (filtered.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center text-gray-500">No se encontraron protocolos que coincidan.</p>`;
                return;
            }

            grid.innerHTML = filtered.map(p => `
                <div class="product-card glass-panel flex flex-col cursor-pointer group" onclick="openModal('${p.id}')">
                    <div class="relative h-48 overflow-hidden rounded-t-2xl">
                        <img src="${p.image_url || ''}" loading="lazy" 
                             class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500"
                             onerror="this.style.display='none'; this.nextElementSibling.classList.remove('hidden');">
                        <div class="hidden w-full h-full bg-gradient-to-br from-cyan-900/30 to-purple-900/30 flex items-center justify-center absolute inset-0">
                            <i class="fas fa-brain text-4xl text-cyan-500/40"></i>
                        </div>
                        <div class="absolute top-2 right-2 px-3 py-1 bg-cyan-500 text-black rounded-full text-xs font-black">$${p.price}</div>
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold text-sm text-white group-hover:text-cyan-400 transition-colors">${p.title}</h3>
                        <div class="flex justify-between items-center mt-2 text-[10px] text-gray-500 uppercase">
                            <span>${p.specialty || 'General'}</span>
                            <span class="text-cyan-400"><i class="fas fa-sync"></i> ${calculateFreshness(p.last_updated)}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function calculateFreshness(dateString) {
            if (!dateString) return "N/A";
            const diffDays = Math.floor((new Date() - new Date(dateString)) / (1000 * 60 * 60 * 24));
            if (diffDays < 0) return "Ahora";
            if (diffDays < 7) return `Hace ${diffDays}d`;
            return `⚠️ +7 días`;
        }

        // =====================================================
        // 3. MODAL DE PRODUCTO
        // =====================================================
        async function openModal(id) {
            const p = inventory.find(x => String(x.id) === String(id));
            if (!p) { showToast("❌ Producto no encontrado."); return; }
            selectedProduct = p;

            document.getElementById('productModal').classList.remove('hidden');
            document.getElementById('modalContent').innerHTML = `
                <button onclick="closeModal('productModal')" class="absolute top-4 right-4 text-2xl text-gray-500 hover:text-white z-10">&times;</button>
                <div class="flex-1 min-h-[200px] rounded-xl overflow-hidden bg-gradient-to-br from-cyan-900/20 to-purple-900/20">
                    <img src="${p.image_url || ''}" class="w-full h-full object-cover"
                         onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\\'flex items-center justify-center h-full\\'><i class=\\'fas fa-brain text-6xl text-cyan-500/30\\'></i></div>';">
                </div>
                <div class="flex-1 flex flex-col justify-between">
                    <div>
                        <div class="fresh-badge text-black text-[10px] font-bold px-2 py-1 rounded inline-block mb-2 uppercase">Contenido Sincronizado</div>
                        <p class="text-cyan-400 text-sm font-bold uppercase tracking-widest">${p.specialty || 'General'}</p>
                        <h1 class="text-3xl font-black mb-4 leading-none">${p.title}</h1>
                        <p class="text-gray-400 text-sm leading-relaxed mb-6">${p.description || 'Acceso total al framework de IA. Última versión. Actualizado automáticamente.'}</p>
                    </div>
                    <div class="bg-black/40 p-6 rounded-2xl border border-white/5">
                        <p class="text-4xl font-black text-white mb-4">$${p.price}</p>
                        <button onclick="openCheckout()" class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-black py-4 rounded-xl uppercase tracking-widest transition-all">
                            Sincronizar Pago
                        </button>
                    </div>
                </div>
            `;
        }

        // =====================================================
        // 4. CHECKOUT — Pide métodos de pago a la API
        // =====================================================
        async function openCheckout() {
            closeModal('productModal');
            document.getElementById('checkoutProductName').innerText = `${selectedProduct.title} - $${selectedProduct.price}`;
            document.getElementById('checkoutModal').classList.remove('hidden');
            switchTab('crypto');
            fetchPaymentMethods();
        }

        async function fetchPaymentMethods() {
            const cryptoContainer = document.getElementById('crypto-wallets-container');
            const bankContainer = document.getElementById('bank-accounts-container');
            const stripeContainer = document.getElementById('stripe-container');

            // Spinners
            cryptoContainer.innerHTML = `<div class="flex items-center justify-center p-10"><div class="w-8 h-8 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div><span class="ml-3 text-sm text-gray-400">Sincronizando wallets...</span></div>`;

            try {
                const response = await fetch(`${API_BASE}/api/payment-methods/${selectedProduct.id}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                paymentData = await response.json();

                // === CRYPTO ===
                const cryptoEntries = Object.entries(paymentData.crypto || {}).filter(([k, v]) => v.wallet_address);
                cryptoContainer.innerHTML = cryptoEntries.map(([key, val]) => `
                    <div class="p-4 bg-black/50 rounded-lg border border-cyan-500/30 mb-3">
                        <p class="text-xs text-cyan-400 font-bold mb-1"><i class="fas fa-wallet mr-1"></i> ${key} (${val.network})</p>
                        <div class="flex justify-between items-center gap-2">
                            <code class="text-xs text-gray-300 break-all">${val.wallet_address}</code>
                            <button onclick="copyToClipboard('${val.wallet_address}')" class="text-cyan-500 px-3 py-1 bg-cyan-500/10 rounded hover:bg-cyan-500/20 transition-colors flex-shrink-0"><i class="fas fa-copy"></i></button>
                        </div>
                    </div>
                `).join('') || '<p class="text-gray-500 text-center text-sm py-4">No hay wallets configuradas.</p>';

                // === BANK ===
                const bankEntries = Object.entries(paymentData.bank_accounts || {}).filter(([k, v]) => v.account || v.iban);
                bankContainer.innerHTML = bankEntries.map(([region, info]) => `
                    <div class="p-4 bg-black/50 rounded-lg border border-yellow-500/30 mb-3">
                        <p class="text-xs text-yellow-400 font-bold mb-2"><i class="fas fa-university mr-1"></i> ${info.bank} (${region})</p>
                        <div class="space-y-1 text-sm text-gray-300">
                            <p><span class="text-gray-500">Titular:</span> ${info.holder}</p>
                            ${info.account ? `<p><span class="text-gray-500">Cuenta:</span> ${info.account} <button onclick="copyToClipboard('${info.account}')" class="text-yellow-500 text-xs ml-1"><i class="fas fa-copy"></i></button></p>` : ''}
                            ${info.iban ? `<p><span class="text-gray-500">IBAN:</span> ${info.iban} <button onclick="copyToClipboard('${info.iban}')" class="text-yellow-500 text-xs ml-1"><i class="fas fa-copy"></i></button></p>` : ''}
                            ${info.bic ? `<p><span class="text-gray-500">BIC:</span> ${info.bic}</p>` : ''}
                            ${info.routing ? `<p><span class="text-gray-500">Routing:</span> ${info.routing}</p>` : ''}
                        </div>
                    </div>
                `).join('') || '<p class="text-gray-500 text-center text-sm py-4">No hay cuentas bancarias configuradas.</p>';

                // === STRIPE ===
                if (paymentData.stripe_link) {
                    stripeContainer.innerHTML = `
                        <div class="text-center py-6">
                            <i class="fab fa-stripe text-5xl text-purple-400 mb-4"></i>
                            <p class="text-gray-400 text-sm mb-4">Pago seguro con tarjeta de crédito/débito</p>
                            <a href="${paymentData.stripe_link}" target="_blank" rel="noopener"
                               class="inline-block bg-purple-600 hover:bg-purple-500 text-white font-black py-4 px-10 rounded-xl uppercase tracking-widest transition-all">
                                <i class="fas fa-credit-card mr-2"></i> Pagar con Stripe
                            </a>
                            <p class="text-[10px] text-gray-600 mt-3">Se abrirá en una nueva ventana segura de Stripe.</p>
                        </div>`;
                } else {
                    stripeContainer.innerHTML = '<p class="text-gray-500 text-center text-sm py-8">Stripe no configurado.</p>';
                }

            } catch (e) {
                console.error("Error fetching payment methods:", e);
                cryptoContainer.innerHTML = `
                    <div class="text-center py-8">
                        <i class="fas fa-exclamation-triangle text-2xl text-red-500 mb-3 block"></i>
                        <p class="text-red-400 text-sm mb-1">Error de conexión con el Nodo</p>
                        <p class="text-gray-600 text-xs mb-4">Verifica que la API esté activa.</p>
                        <button onclick="fetchPaymentMethods()" class="px-4 py-2 bg-cyan-500/20 text-cyan-400 rounded text-xs hover:bg-cyan-500/30 transition-colors">
                            <i class="fas fa-redo mr-1"></i> Reintentar
                        </button>
                    </div>`;
                bankContainer.innerHTML = '';
                stripeContainer.innerHTML = '';
            }
        }

        // =====================================================
        // 5. VERIFICACIÓN DE PAGO — via API
        // =====================================================
        async function verifyPayment() {
            const email = document.getElementById('buyerEmail').value.trim();
            const txHash = document.getElementById('txHash').value.trim();
            const btn = document.getElementById('btnVerify');

            if (!email || !txHash) { showToast("❌ Email y TXID requeridos."); return; }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showToast("❌ Email inválido."); return; }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i> Verificando en Blockchain...';

            try {
                const response = await fetch(`${API_BASE}/api/verify-payment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        product_id: String(selectedProduct.id),
                        tx_id: txHash,
                        email: email,
                        currency: 'USDT_TRC20',
                        amount: selectedProduct.price
                    })
                });
                const result = await response.json();

                if (result.status === 'success') {
                    showToast("✅ ¡PAGO REGISTRADO! Verificación en proceso...");
                    setTimeout(() => closeModal('checkoutModal'), 3000);
                } else {
                    showToast("❌ " + (result.message || result.detail || "Error del servidor."));
                }
            } catch (err) {
                console.error("Error verificando pago:", err);
                showToast("❌ Error de red. Verifica tu conexión.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Sincronizar Pago en Nodo';
            }
        }

        // =====================================================
        // UTILS
        // =====================================================
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function switchTab(tab) {
            ['crypto', 'bank', 'stripe'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.remove('active');
                document.getElementById(`content-${t}`).classList.add('hidden');
            });
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById(`content-${tab}`).classList.remove('hidden');
        }

        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
            } catch (e) {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.cssText = 'position:fixed;opacity:0';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
            }
            showToast(`✅ Copiado: ${text.substring(0, 16)}...`);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        // =====================================================
        // INIT
        // =====================================================
        window.onload = () => {
            initInventory();
        };
    </script>
</body>
</html>
