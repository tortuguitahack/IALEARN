<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIHACKTOR Ω - Nexus de IA Expertos</title>
    <meta name="description"
        content="Plataforma premium de herramientas de IA. Accede a tutoriales y sistemas de IA accionables con precio único de $6.99 USD.">

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --nebula-bg: radial-gradient(circle at center, #1a0b2e 0%, #010103 100%);
            --accent: #00f2ff;
            --gold: #ffcf00;
        }

        body {
            background: var(--nebula-bg);
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }

        .product-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(0, 0, 0, 0.4);
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
            border-color: var(--accent);
        }

        .glitch-text {
            text-shadow: 2px 2px #ff00c1, -2px -2px #00fff9;
        }

        .tab-btn.active {
            border-bottom: 2px solid var(--accent);
            color: var(--accent);
        }

        .fresh-badge {
            background: linear-gradient(45deg, #00f2ff, #0066ff);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.8;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.8;
            }
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="min-h-screen">

    <!-- Header -->
    <header class="sticky top-0 z-50 glass-panel mx-4 mt-4 p-4 flex flex-wrap justify-between items-center gap-4">
        <div class="flex items-center gap-3">
            <div
                class="w-12 h-12 bg-cyan-500 rounded-full flex items-center justify-center animate-pulse shadow-[0_0_15px_#00f2ff]">
                <i class="fas fa-microchip text-2xl text-black"></i>
            </div>
            <div>
                <h1 class="text-xl font-black tracking-tighter glitch-text">DIHACKTOR Ω</h1>
                <p class="text-[10px] text-cyan-400 uppercase tracking-[0.2em]">GitHub Pages + Supabase · Precio fijo $6.99</p>
            </div>
        </div>
        <div class="flex-grow max-w-xl">
            <div class="relative">
                <input type="text" id="searchInput" placeholder="Buscar Protocolos de IA..."
                    oninput="handleSearch(this.value)"
                    class="w-full bg-black/50 border border-white/10 rounded-full py-2 px-10 focus:outline-none focus:border-cyan-400 text-sm transition-all">
                <i class="fas fa-search absolute left-4 top-3 text-gray-500 text-sm"></i>
            </div>
        </div>
    </header>

    <!-- Categorías -->
    <nav class="flex overflow-x-auto p-4 gap-3 no-scrollbar mx-2 mt-2">
        <button onclick="filterSpecialty(null)"
            class="whitespace-nowrap px-6 py-2 rounded-full glass-panel text-xs hover:bg-white/10 transition-colors">TODO</button>
        <div id="specialtyContainer" class="flex gap-3"></div>
    </nav>

    <!-- Grid de Productos -->
    <main class="container mx-auto px-4 py-8">
        <div id="inventoryGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div class="col-span-full flex flex-col items-center justify-center py-20">
                <div class="w-10 h-10 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mb-4">
                </div>
                <p class="text-gray-500 text-sm">Cargando catálogo oficial DIHACKTOR Ω...</p>
            </div>
        </div>
        <div id="loadMoreContainer" class="flex justify-center mt-8 hidden">
            <button onclick="loadMore()"
                class="px-8 py-3 bg-cyan-500/20 text-cyan-400 border border-cyan-500/50 rounded-full hover:bg-cyan-500/40 transition-all uppercase text-xs font-black tracking-widest flex items-center">
                <i class="fas fa-chevron-down mr-2"></i>Cargar Más Protocolos
            </button>
        </div>
    </main>

    <!-- Modal de Producto -->
    <div id="productModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-md" onclick="closeModal('productModal')"></div>
        <div id="modalContent"
            class="relative glass-panel max-w-4xl w-full max-h-[90vh] overflow-y-auto p-6 md:p-10 flex flex-col md:flex-row gap-8">
        </div>
    </div>

    <!-- Modal de Checkout -->
    <div id="checkoutModal" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-xl"></div>
        <div
            class="relative glass-panel border border-cyan-500/50 max-w-2xl w-full p-8 shadow-[0_0_50px_rgba(0,242,255,0.1)]">
            <button onclick="closeModal('checkoutModal')"
                class="absolute top-4 right-4 text-2xl text-gray-500 hover:text-red-500 transition-colors">&times;</button>

            <h2 class="text-2xl font-black mb-2 glitch-text uppercase">Terminal de Pago</h2>
            <p class="text-xs text-gray-400 mb-6" id="checkoutProductName">Procesando orden...</p>

            <div class="flex border-b border-white/10 mb-6">
                <button onclick="switchTab('crypto')" id="tab-crypto"
                    class="tab-btn active flex-1 py-3 text-sm font-bold uppercase transition-all"><i
                        class="fab fa-bitcoin mr-2"></i>Crypto</button>
                <button onclick="switchTab('bank')" id="tab-bank"
                    class="tab-btn flex-1 py-3 text-sm font-bold uppercase transition-all"><i
                        class="fas fa-university mr-2"></i>Banca Fiat</button>
                <button onclick="switchTab('stripe')" id="tab-stripe"
                    class="tab-btn flex-1 py-3 text-sm font-bold uppercase transition-all"><i
                        class="fab fa-stripe mr-2"></i>Stripe</button>
            </div>

            <!-- Contenido Crypto -->
            <div id="content-crypto" class="space-y-4"></div>

            <!-- Contenido Banca Fiat -->
            <div id="content-bank" class="space-y-4 hidden"></div>

            <!-- Contenido Stripe -->
            <div id="content-stripe" class="space-y-4 hidden text-center py-8"></div>

            <div class="mt-6 pt-6 border-t border-white/10">
                <p class="text-xs text-cyan-400 mb-2 uppercase font-bold"><i class="fas fa-shield-alt"></i> Verificación
                    de Red</p>
                <input type="email" id="buyerEmail" placeholder="Email para entrega..."
                    class="w-full bg-black border border-white/10 rounded px-4 py-2 text-sm mb-3 focus:border-cyan-500 outline-none">
                <input type="text" id="txHash" placeholder="Pega aquí el TXID o Hash de tu pago..."
                    class="w-full bg-black border border-white/10 rounded px-4 py-2 text-sm mb-4 focus:border-cyan-500 outline-none">

                <button onclick="verifyPayment()" id="btnVerify"
                    class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-black py-3 rounded uppercase tracking-widest transition-all">
                    Registrar referencia de pago
                </button>
            </div>
        </div>
    </div>

    <div id="toast"
        class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 glass-panel px-6 py-3 border-cyan-500 flex items-center gap-3 z-[200]">
        <i class="fas fa-info-circle text-cyan-400"></i>
        <span id="toastMsg" class="text-sm font-bold">Copiado</span>
    </div>

    <script>
        // =====================================================
        // CONFIGURACIÓN SERVERLESS Y CREDENCIALES
        // =====================================================
        // Tu llave ANON_KEY y URL de Supabase están hechas exactamente 
        // para estar aquí. Su nombre "ANON" significa Anónimo Público.
        const SUPABASE_URL = window.DIHACKTOR_SUPABASE_URL || "https://ebqxqqpgbeivmvztskns.supabase.co";
        const SUPABASE_ANON_KEY = window.DIHACKTOR_SUPABASE_ANON_KEY || "sb_publishable_Uzgb2szW4EYHdBvAHfa7Zg_408Q4orp";
        const FIXED_PRICE = 6.99;
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Métodos de pago públicos, sin secretos incrustados
        const PAYMENTS = {
            crypto: {
                "USDT_TRC20": { address: "0xeBe965EFe1ab53d2da915134d72e5BdBd5E3C053", net: "TRC-20 (Tron)" },
                "USDC": { address: "0xeBe965EFe1ab53d2da915134d72e5BdBd5E3C053", net: "ERC-20 (Eth)" },
                "BTC": { address: "bc1qjjgsx3lwa0wz59l89htcpr28j5s7dtmv99fmw0", net: "Bitcoin" },
                "ETH": { address: "0x2F4bc6f77719AB99BCd6a9b553729bB96C9B8c22", net: "Ethereum" }
            },
            banks: {
                "USA": { bank: "Lead Bank", holder: "Diego Edgardo Cortez Yanez", acc: "219449048779", route: "101019644" },
                "Europe": { bank: "OPENPAYD MALTA", holder: "Diego Edgardo Cortez Yáñez", iban: "MT12CFTE28004000000000005456093", bic: "CFTEMTM1XXX" },
                "Bolivia": { bank: "Banco Mercantil Santa Cruz", holder: "DIEGO EDGARDO CORTEZ YAÑEZ", acc: "4069474188", ci: "5808841TJ" }
            },
            stripe: {
                checkout: "https://buy.stripe.com/cNicN5727fLAfDd9Ws9Ve06"
            }
        };

        // =====================================================
        // CONFIGURACIÓN DE DESPLIEGUE MASIVO
        // =====================================================
        // Cambia esto a una categoría específica si quieres clonar esta tienda
        // para un nicho en particular (ej. "IA Generativa", "Bots").
        // Si está vacío (''), cargará TODOS los productos.
        const STORE_NICHE = '';

        // Paginación para manejar miles de productos (10000+)
        const ITEMS_PER_PAGE = 24;
        let currentPage = 0;
        let totalItems = 0;
        let isLoading = false;

        let inventory = [];
        let selectedProduct = null;
        let activeSpecialty = null;
        let searchQuery = '';

        // =====================================================
        // 1. CARGA MASIVA CON PAGINACIÓN SERVER-SIDE
        // =====================================================
        async function fetchInventory(reset = false) {
            if (isLoading) return;
            isLoading = true;

            const grid = document.getElementById('inventoryGrid');
            const loadBtn = document.getElementById('loadMoreContainer');

            if (reset) {
                currentPage = 0;
                inventory = [];
                grid.innerHTML = `
                    <div class="col-span-full flex flex-col items-center justify-center py-20">
                        <div class="w-10 h-10 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                        <p class="text-gray-500 text-sm">Sincronizando con el Nexus...</p>
                    </div>`;
                if (loadBtn) loadBtn.classList.add('hidden');
            } else {
                if (loadBtn) {
                    const btnIcon = loadBtn.querySelector('i');
                    if (btnIcon) btnIcon.className = "fas fa-spinner animate-spin mr-2";
                }
            }

            try {
                let query = supabaseClient.from('products').select('*', { count: 'exact' }).eq('is_active', true);

                // Multi-tienda: filtro maestro de la página
                if (STORE_NICHE) {
                    query = query.eq('specialty', STORE_NICHE);
                }

                // Filtro por tab activo
                if (activeSpecialty) {
                    query = query.eq('specialty', activeSpecialty);
                }

                // Búsqueda en servidor (soporta 10k+ items)
                if (searchQuery) {
                    query = query.or(`title.ilike.%${searchQuery}%,description.ilike.%${searchQuery}%,specialty.ilike.%${searchQuery}%`);
                }

                // Rango de Paginación
                const from = currentPage * ITEMS_PER_PAGE;
                const to = from + ITEMS_PER_PAGE - 1;
                query = query.range(from, to).order('id', { ascending: false });

                const { data, count, error } = await query;
                if (error) throw error;

                totalItems = count || 0;

                if (reset) {
                    inventory = data || [];
                } else {
                    inventory = [...inventory, ...(data || [])];
                }

                renderGrid();

                // Mostrar/Ocultar botón de "Cargar más"
                if (loadBtn) {
                    if (inventory.length < totalItems) {
                        loadBtn.classList.remove('hidden');
                        const btnIcon = loadBtn.querySelector('i');
                        if (btnIcon) btnIcon.className = "fas fa-chevron-down mr-2";
                    } else {
                        loadBtn.classList.add('hidden');
                    }
                }

                // Obtener categorías únicas solo la primera vez si no hay nicho fijo
                if (reset && !STORE_NICHE && !activeSpecialty && !searchQuery) {
                    fetchCategories();
                }

            } catch (err) {
                console.error("Error Supabase:", err);
                grid.innerHTML = `
                    <div class="col-span-full text-center py-20">
                        <i class="fas fa-exclamation-triangle text-4xl text-red-500 mb-4 block"></i>
                        <p class="text-gray-400 font-bold">Error de conexión masiva</p>
                        <button onclick="fetchInventory(true)" class="mt-4 px-6 py-2 bg-cyan-500/20 text-cyan-400 rounded-full text-xs hover:bg-cyan-500/30 transition-colors">
                            <i class="fas fa-redo mr-1"></i> Reintentar
                        </button>
                    </div>`;
            } finally {
                isLoading = false;
            }
        }

        async function fetchCategories() {
            try {
                // Obtenemos una muestra para armar las categorías dinámicamente
                const { data } = await supabaseClient.from('products').select('specialty').eq('is_active', true).limit(1000);
                if (data) {
                    const specialties = [...new Set(data.map(p => p.specialty).filter(Boolean))];
                    const container = document.getElementById('specialtyContainer');
                    container.innerHTML = specialties.map(s => `
                        <button onclick="filterSpecialty('${s}')" class="whitespace-nowrap px-6 py-2 rounded-full glass-panel text-xs hover:bg-white/10 transition-colors">${s}</button>
                    `).join('');
                }
            } catch (e) { console.error("No se pudieron cargar categorías", e); }
        }

        function loadMore() {
            currentPage++;
            fetchInventory(false);
        }

        let searchTimeout;
        function handleSearch(query) {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                searchQuery = query.trim();
                fetchInventory(true);
            }, 500); // Debounce de 500ms
        }

        function filterSpecialty(specialty) {
            activeSpecialty = specialty;
            fetchInventory(true);
        }

        // =====================================================
        // 2. RENDER (Optimizado)
        // =====================================================
        function renderGrid() {
            const grid = document.getElementById('inventoryGrid');
            if (inventory.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center text-gray-500 py-10">No se encontraron protocolos. Sube el CSV a Supabase o revisa la búsqueda.</p>`;
                return;
            }

            grid.innerHTML = inventory.map(p => `
                <div class="product-card glass-panel flex flex-col cursor-pointer group" onclick="openModal('${p.id}')">
                    <div class="relative h-48 overflow-hidden rounded-t-2xl">
                        <img src="${p.image_url || ''}" loading="lazy" 
                             class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500"
                             onerror="this.style.display='none'; this.nextElementSibling.classList.remove('hidden');">
                        <div class="hidden w-full h-full bg-gradient-to-br from-cyan-900/30 to-purple-900/30 flex items-center justify-center absolute inset-0">
                            <i class="fas fa-brain text-4xl text-cyan-500/40"></i>
                        </div>
                        <div class="absolute top-2 right-2 px-3 py-1 bg-cyan-500 text-black rounded-full text-xs font-black">$${Number(FIXED_PRICE).toFixed(2)}</div>
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold text-sm text-white group-hover:text-cyan-400 transition-colors" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${p.title}</h3>
                        <div class="flex justify-between items-center mt-2 text-[10px] text-gray-500 uppercase">
                            <span>${p.specialty || 'General'}</span>
                            <span class="text-cyan-400"><i class="fas fa-check-circle"></i> Activo</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // =====================================================
        // 3. MODAL DE PRODUCTO Y CHECKOUT (STATIC)
        // =====================================================
        async function openModal(id) {
            const p = inventory.find(x => String(x.id) === String(id));
            if (!p) return;
            selectedProduct = p;

            document.getElementById('productModal').classList.remove('hidden');
            document.getElementById('modalContent').innerHTML = `
                <button onclick="closeModal('productModal')" class="absolute top-4 right-4 text-2xl text-gray-500 hover:text-white z-10">&times;</button>
                <div class="flex-1 min-h-[200px] rounded-xl overflow-hidden bg-gradient-to-br from-cyan-900/20 to-purple-900/20">
                    <img src="${p.image_url || ''}" class="w-full h-full object-cover"
                         onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\\'flex items-center justify-center h-full\\'><i class=\\'fas fa-brain text-6xl text-cyan-500/30\\'></i></div>';">
                </div>
                <div class="flex-1 flex flex-col justify-between">
                    <div>
                        <div class="fresh-badge text-black text-[10px] font-bold px-2 py-1 rounded inline-block mb-2 uppercase">Serverless Activo</div>
                        <p class="text-cyan-400 text-sm font-bold uppercase tracking-widest">${p.specialty || 'General'}</p>
                        <h1 class="text-3xl font-black mb-4 leading-none">${p.title}</h1>
                        <p class="text-gray-400 text-sm leading-relaxed mb-6">${p.description || 'Framework avanzado IA.'}</p>
                    </div>
                    <div class="bg-black/40 p-6 rounded-2xl border border-white/5">
                        <p class="text-4xl font-black text-white mb-4">$${Number(FIXED_PRICE).toFixed(2)}</p>
                        <button onclick="openCheckout()" class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-black py-4 rounded-xl uppercase tracking-widest transition-all">
                            Sincronizar Pago
                        </button>
                    </div>
                </div>
            `;
        }

        function openCheckout() {
            closeModal('productModal');
            document.getElementById('checkoutProductName').innerText = `${selectedProduct.title} - $${Number(FIXED_PRICE).toFixed(2)}`;
            document.getElementById('checkoutModal').classList.remove('hidden');

            // Llenar datos de pago fijos
            renderPaymentMethods();
            switchTab('crypto');
        }

        function renderPaymentMethods() {
            // Crypto
            document.getElementById('content-crypto').innerHTML = Object.entries(PAYMENTS.crypto).map(([k, v]) => `
                <div class="p-4 bg-black/50 rounded-lg border border-cyan-500/30 mb-3">
                    <p class="text-xs text-cyan-400 font-bold mb-1"><i class="fas fa-wallet mr-1"></i> ${k} (${v.net})</p>
                    <div class="flex justify-between items-center gap-2">
                        <code class="text-xs text-gray-300 break-all">${v.address}</code>
                        <button onclick="copyToClipboard('${v.address}')" class="text-cyan-500 px-3 py-1 bg-cyan-500/10 rounded hover:bg-cyan-500/20"><i class="fas fa-copy"></i></button>
                    </div>
                </div>
            `).join('');

            // Bank
            document.getElementById('content-bank').innerHTML = Object.entries(PAYMENTS.banks).map(([r, b]) => `
                <div class="p-4 bg-black/50 rounded-lg border border-yellow-500/30 mb-3 text-sm text-gray-300 space-y-1">
                    <p class="text-xs text-yellow-400 font-bold mb-2"><i class="fas fa-university"></i> ${b.bank} (${r})</p>
                    <p><span class="text-gray-500">Titular:</span> ${b.holder}</p>
                    ${b.acc ? `<p><span class="text-gray-500">Cuenta:</span> ${b.acc} <button onclick="copyToClipboard('${b.acc}')" class="text-yellow-500 ml-1"><i class="fas fa-copy"></i></button></p>` : ''}
                    ${b.iban ? `<p><span class="text-gray-500">IBAN:</span> ${b.iban} <button onclick="copyToClipboard('${b.iban}')" class="text-yellow-500 ml-1"><i class="fas fa-copy"></i></button></p>` : ''}
                    ${b.bic ? `<p><span class="text-gray-500">BIC:</span> ${b.bic}</p>` : ''}
                </div>
            `).join('');

            // Stripe Link logic
            const sLink = PAYMENTS.stripe.checkout;

            document.getElementById('content-stripe').innerHTML = `
                <i class="fab fa-stripe text-5xl text-purple-400 mb-4"></i>
                <p class="text-gray-400 text-sm mb-4">Pago seguro con tarjeta · precio fijo 6.99 USD</p>
                <a href="${sLink}" target="_blank" rel="noopener"
                   class="inline-block bg-purple-600 hover:bg-purple-500 text-white font-black py-4 px-10 rounded-xl uppercase tracking-widest transition-all">
                    <i class="fas fa-credit-card mr-2"></i> Pagar con Stripe
                </a>`;
        }

        // =====================================================
        // 4. VERIFICACIÓN DE PAGO (INSERT DIRECTO A SUPABASE)
        // =====================================================
        async function verifyPayment() {
            const email = document.getElementById('buyerEmail').value.trim();
            const txHash = document.getElementById('txHash').value.trim();
            const btn = document.getElementById('btnVerify');

            if (!email || !txHash) { showToast("❌ Email y referencia requeridos."); return; }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showToast("❌ Email inválido."); return; }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i> Registrando...';

            try {
                const payload = {
                    product_id: selectedProduct.id,
                    product_title: selectedProduct.title,
                    email,
                    tx_id: txHash,
                    currency: 'MANUAL',
                    amount: FIXED_PRICE,
                    status: 'pending_verification'
                };

                const { error } = await supabaseClient.from('orders').insert([payload]);
                if (error) throw error;

                showToast("✅ Referencia registrada para verificación manual.");
                setTimeout(() => closeModal('checkoutModal'), 2500);
            } catch (err) {
                console.error("Error registrando orden:", err);
                showToast("⚠️ No fue posible registrar ahora. Guarda tu TXID y reintenta.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Registrar referencia de pago';
            }
        }

        // =====================================================
        // UTILS
        // =====================================================
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function switchTab(tab) {
            ['crypto', 'bank', 'stripe'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.remove('active');
                document.getElementById(`content-${t}`).classList.add('hidden');
            });
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById(`content-${tab}`).classList.remove('hidden');
        }

        async function copyToClipboard(text) {
            try { await navigator.clipboard.writeText(text); }
            catch (e) {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select(); document.execCommand('copy');
                document.body.removeChild(ta);
            }
            showToast(`✅ Copiado: ${text.substring(0, 16)}...`);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        // =====================================================
        // INIT
        // =====================================================
        window.onload = () => fetchInventory(true);
    </script>
</body>
